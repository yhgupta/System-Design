<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--s1:#16161a;--s2:#1e1e24;--s3:#26262e;
  --border:#2a2a35;--border2:#383848;
  --text:#eeeef0;--muted:#6b6b80;--faint:#3a3a48;
  --accent:#818cf8;--accent-dim:#3730a3;--accent-bg:#1e1d3f;
  --green:#34d399;--green-bg:#052e1c;--green-border:#065f46;
  --red:#f87171;--red-bg:#2d1010;
  --radius:10px;--radius-lg:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--accent);font-style:normal}
.topbar-btns{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:.15s}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.btn-green:hover{background:#065f46}
.btn-accent{background:var(--accent-dim);color:var(--accent);border:1px solid #4a45b0}
.btn-accent:hover{background:var(--accent);color:#fff}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid #5a1a1a}
.btn-red:hover{background:#5a1a1a}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:7px;border-radius:7px}

/* LAYOUT */
.shell{max-width:760px;margin:0 auto;padding:24px 20px 80px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:.15s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text)}
.pane{display:none}.pane.on{display:block}

/* DATE ROW */
.date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.date-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.date-controls{display:flex;gap:7px;align-items:center}
.date-input{background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:var(--radius);font-size:14px;outline:none;font-family:inherit}
.date-input:focus{border-color:var(--accent)}

/* SEC LABEL */
.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:20px 0 10px}

/* EXERCISE CARD */
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.ex-head{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--border)}
.ex-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.ex-name{flex:1;font-size:15px;font-weight:600}
.ex-vol{font-size:11px;color:var(--muted);background:var(--s3);padding:2px 9px;border-radius:20px;white-space:nowrap}

/* SETS TABLE */
.sets-wrap{overflow-x:auto}
.sets-tbl{width:100%;border-collapse:collapse;min-width:280px}
.sets-tbl thead th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:7px 12px;background:var(--s2);text-align:center;font-weight:500}
.sets-tbl thead th:first-child{text-align:left;padding-left:15px}
.sets-tbl tbody td{padding:5px 8px;border-top:1px solid var(--border);text-align:center;vertical-align:middle}
.sets-tbl tbody td:first-child{padding-left:15px}
.set-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--s3);font-size:11px;font-weight:700;color:var(--muted)}
.num-inp{width:78px;background:var(--s3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:14px;text-align:center;outline:none;font-family:inherit;-moz-appearance:textfield}
.num-inp::-webkit-outer-spin-button,.num-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.num-inp:focus{border-color:var(--accent)}
.check-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.check-btn.done{background:var(--green-bg);border-color:var(--green)}
.del-set-btn{width:24px;height:24px;border-radius:5px;border:none;background:none;color:var(--faint);cursor:pointer;font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.del-set-btn:hover{background:var(--red-bg);color:var(--red)}

/* CARD FOOT */
.ex-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 13px}
.prog{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--s3);color:var(--muted)}
.prog.done{background:var(--green-bg);color:var(--green)}
.add-set-btn{background:none;border:1px dashed var(--border2);border-radius:6px;padding:4px 11px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;transition:.15s}
.add-set-btn:hover{border-color:var(--accent);color:var(--accent)}

/* DEL EXERCISE BUTTON */
.del-ex-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #5a1a1a;background:var(--red-bg);color:var(--red);font-family:inherit;transition:.15s}
.del-ex-btn:hover{background:#5a1a1a;color:#fca5a5}
.del-ex-btn svg{width:12px;height:12px}

/* ADD PANEL */
.add-panel{background:var(--s1);border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:16px;margin-top:6px}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.ex-wrap{position:relative;flex:1;min-width:190px}
.ex-inp{width:100%;background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:8px 13px;border-radius:var(--radius);font-size:14px;outline:none;font-family:inherit}
.ex-inp:focus{border-color:var(--accent)}
.drop{position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--s2);border:1px solid var(--border2);border-radius:var(--radius);z-index:200;max-height:210px;overflow-y:auto;box-shadow:0 12px 32px rgba(0,0,0,.6);display:none}
.drop.open{display:block}
.drop-item{padding:9px 13px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;transition:.1s}
.drop-item:hover,.drop-item.hi{background:var(--s3)}
.di-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.di-badge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--accent-bg);color:var(--accent)}
.di-count{margin-left:auto;font-size:11px;color:var(--muted)}
.drop-none{padding:10px 13px;color:var(--muted);font-size:13px;font-style:italic}
.sets-sel{background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:var(--radius);font-size:14px;outline:none;cursor:pointer;font-family:inherit}

/* HISTORY */
.hist-group{margin-bottom:26px}
.hist-date-row{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hist-date-row::after{content:'';flex:1;height:1px;background:var(--border)}
.hist-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px}
.hist-exname{padding:9px 15px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.hist-tbl{width:100%;border-collapse:collapse;font-size:13px}
.hist-tbl th{text-align:center;padding:6px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--s2);font-weight:500}
.hist-tbl td{text-align:center;padding:7px 12px;border-top:1px solid var(--border)}
.hist-tbl tr:hover td{background:var(--s2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-ico{font-size:38px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.8}

/* HOW-TO BANNER */
.howto{background:var(--accent-bg);border:1px solid var(--accent-dim);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--accent);line-height:1.6}
.howto strong{color:#a5b4fc}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);padding:9px 18px;border-radius:9px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red-bg);color:var(--red);border-color:#5a1a1a}

@media(max-width:500px){
  .topbar{padding:0 12px}
  .shell{padding:16px 12px 60px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stats-grid .stat-box:last-child{grid-column:1/-1}
}

/* PROGRESS TAB */
.progress-shell { }
.ex-selector-row { display:flex; align-items:center; gap:10px; margin-bottom:22px; flex-wrap:wrap; }
.ex-selector-row label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
.ex-select { flex:1; min-width:180px; background:var(--s2); border:1px solid var(--border2); color:var(--text); padding:8px 13px; border-radius:var(--radius); font-size:14px; outline:none; font-family:inherit; cursor:pointer; }
.ex-select:focus { border-color:var(--accent); }
.metric-toggle { display:flex; gap:6px; }
.metric-btn { padding:6px 14px; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--muted); font-family:inherit; transition:.15s; }
.metric-btn.on { background:var(--accent-dim); color:var(--accent); border-color:var(--accent-dim); }
.chart-card { background:var(--s1); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:14px; }
.chart-title { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
.chart-title span { color:var(--accent); font-size:11px; font-weight:500; }
.chart-wrap { position:relative; height:240px; }
.pr-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.pr-chip { background:var(--accent-bg); border:1px solid var(--accent-dim); border-radius:8px; padding:6px 12px; font-size:12px; color:var(--accent); }
.pr-chip strong { color:#a5b4fc; }
.no-data-msg { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

/* CATEGORIES */
.cat-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:.15s;background:var(--s3);color:var(--muted);font-family:inherit}
.cat-pill:hover{color:var(--text)}
.cat-pill.on{color:#fff}
.cat-pill .cp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.drop-group-label{padding:6px 13px 3px;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;border-top:1px solid var(--border)}
.drop-group-label:first-child{border-top:none}
.ex-cat-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600;margin-left:4px}
.card-cat-strip{height:3px;width:100%}

/* ── CATEGORY SYSTEM ── */
.cat-pill-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:.15s;font-family:inherit;background:transparent}
.cat-pill-btn.active{color:#fff !important}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-strip{height:3px;border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.ex-cat-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:2px;opacity:.9}
.drop-grp-hdr{padding:5px 13px 3px;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.drop-grp-hdr:first-child{border-top:none}
.drop-grp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* progress group toggle */
.prog-view-toggle{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.prog-view-toggle label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:4px}
.pvt-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;transition:.15s}
.pvt-btn.on{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-dim)}

/* ── GROUPS TAB ── */
.group-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden}
.group-card-head{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--border)}
.group-color-bar{width:4px;height:28px;border-radius:3px;flex-shrink:0}
.group-name{flex:1;font-size:15px;font-weight:600}
.group-count{font-size:12px;color:var(--muted);background:var(--s3);padding:2px 9px;border-radius:20px}
.group-ex-list{padding:10px 15px;display:flex;flex-wrap:wrap;gap:7px}
.group-ex-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid}
.group-ex-chip button{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:2px;opacity:.6}
.group-ex-chip button:hover{opacity:1}
.group-add-row{display:flex;gap:8px;padding:10px 15px;border-top:1px solid var(--border);flex-wrap:wrap}
.add-group-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.group-inp{flex:1;min-width:160px;background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:8px 13px;border-radius:var(--radius);font-size:14px;outline:none;font-family:inherit}
.group-inp:focus{border-color:var(--accent)}
.assign-sel{background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:7px 11px;border-radius:var(--radius);font-size:13px;outline:none;cursor:pointer;font-family:inherit;flex:1;min-width:140px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Lift<em>Log</em></div>
  <div class="topbar-btns">
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('load-input').click()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 9v1.5a1 1 0 001 1h8a1 1 0 001-1V9M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Load Excel
    </button>
    <div style="display:flex;align-items:center;gap:0">
      <button id="btn-save" class="btn btn-green btn-sm" onclick="saveExcel()" style="border-radius:8px 0 0 8px;border-right:none">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 8.5v2a1 1 0 01-1 1H3a1 1 0 01-1-1v-2M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save Excel
      </button>
      <button id="btn-forget" onclick="forgetSaveFile()" title="Forget saved location — next save will ask where to save"
        style="display:none;padding:7px 8px;border-radius:0 8px 8px 0;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);cursor:pointer;font-size:13px;line-height:1;border-left:1px solid var(--green-border)">✕</button>
    </div>
  </div>
</div>
<input type="file" id="load-input" accept=".xlsx" style="display:none" onchange="loadExcel(event)">

<div class="shell">
  <div class="tabs">
    <button class="tab on" id="tab-log"     onclick="switchTab('log')">Log Workout</button>
    <button class="tab"    id="tab-history" onclick="switchTab('history')">History</button>
    <button class="tab"    id="tab-stats"   onclick="switchTab('stats')">Stats</button>
    <button class="tab"    id="tab-progress" onclick="switchTab('progress')">Progress</button>
    <button class="tab"    id="tab-groups"   onclick="switchTab('groups')">Groups</button>
  </div>

  <!-- LOG -->
  <div class="pane on" id="pane-log">
    <div class="howto">
      <strong>How it works:</strong> Log your workout → click <strong>Save Excel</strong> → pick where to save <code>LiftLog.xlsx</code> once.
      After that it saves directly to the same file every time. Click <strong>Load Excel</strong> to restore history from an existing file.
    </div>
    <div class="date-row">
      <span class="date-label">Logging for</span>
      <div class="date-controls">
        <button class="btn btn-outline btn-icon btn-sm" onclick="shiftDate(-1)">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6.5 2L3 5l3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input type="date" class="date-input" id="workout-date" onchange="renderLog()">
        <button class="btn btn-outline btn-icon btn-sm" onclick="shiftDate(1)">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L7 5l-3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn btn-outline btn-sm" onclick="goToday()">Today</button>
      </div>
    </div>
    <div class="sec-label">Exercises</div>
    <div id="log-list"></div>
    <!-- Category quick-pick pills -->
    <div id="cat-pills" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
    <!-- Add exercise panel -->
    <div class="add-panel">
      <div class="add-row">
        <div class="field" style="flex:1;min-width:180px">
          <div class="field-label">Exercise</div>
          <div class="ex-wrap">
            <input type="text" class="ex-inp" id="ex-inp"
              placeholder="Type or pick from list…"
              autocomplete="off"
              oninput="onExInput(this.value)"
              onfocus="onExInput(this.value)"
              onkeydown="onExKey(event)">
            <div class="drop" id="ex-drop"></div>
          </div>
        </div>
        <div class="field">
          <div class="field-label">Category</div>
          <select class="sets-sel" id="cat-sel" style="min-width:110px">
            <option value="">Auto-detect</option>
          </select>
        </div>
        <div class="field">
          <div class="field-label">Sets</div>
          <select class="sets-sel" id="sets-count">
            <option value="1">1</option><option value="2">2</option>
            <option value="3" selected>3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option>
          </select>
        </div>
        <div class="field" style="justify-content:flex-end">
          <button class="btn btn-accent" onclick="addExercise()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Add
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="pane" id="pane-history"><div id="history-content"></div></div>

  <!-- STATS -->
  <div class="pane" id="pane-stats"><div id="stats-content"></div></div>
  <div class="pane" id="pane-progress"><div id="progress-content"></div></div>
  <div class="pane" id="pane-groups"><div id="groups-content"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────
let DB      = {};  // { "2025-03-14": { "Bench Press": [{weight,reps,done},...] } }
let exList  = [];  // exercise name history, most-recent first
let exCats  = {};  // { "Bench Press": "Chest" }  — exercise → group name
let groups  = [];  // ["Chest","Legs",...] — user-defined group names (ordered)

// Assign a rotating palette to groups by index
const PALETTE = ['#f87171','#60a5fa','#34d399','#fbbf24','#a78bfa','#fb923c','#e879f9','#38bdf8','#4ade80','#94a3b8','#f472b6','#2dd4bf'];
function catColor(cat) {
  const i = groups.indexOf(cat);
  return i >= 0 ? PALETTE[i % PALETTE.length] : '#818cf8';
}
function exCat(name) { return exCats[name] || ''; }

function persist() {
  try {
    localStorage.setItem('ll2_db',     JSON.stringify(DB));
    localStorage.setItem('ll2_ex',     JSON.stringify(exList));
    localStorage.setItem('ll2_cats',   JSON.stringify(exCats));
    localStorage.setItem('ll2_groups', JSON.stringify(groups));
  } catch(e) {}
}
function restore() {
  try { DB     = JSON.parse(localStorage.getItem('ll2_db')     || '{}'); } catch(e) { DB = {}; }
  try { exList = JSON.parse(localStorage.getItem('ll2_ex')     || '[]'); } catch(e) { exList = []; }
  try { exCats = JSON.parse(localStorage.getItem('ll2_cats')   || '{}'); } catch(e) { exCats = {}; }
  try { groups = JSON.parse(localStorage.getItem('ll2_groups') || '[]'); } catch(e) { groups = []; }
}

function registerEx(name, cat) {
  name = name.trim();
  const i = exList.findIndex(e => e.toLowerCase() === name.toLowerCase());
  if (i > -1) exList.splice(i, 1);
  exList.unshift(name);
  if (cat) exCats[name] = cat;
  persist();
}

// ── Group management ──
function addGroup(name) {
  name = name.trim();
  if (!name || groups.includes(name)) return;
  groups.push(name);
  persist();
}
function deleteGroup(name) {
  groups = groups.filter(g => g !== name);
  // un-assign exercises in this group
  Object.keys(exCats).forEach(ex => { if (exCats[ex] === name) delete exCats[ex]; });
  persist();
}
function assignExToGroup(exName, groupName) {
  if (groupName) exCats[exName] = groupName;
  else delete exCats[exName];
  persist();
}

// ─────────────────────────────────────────
//  DATE HELPERS
// ─────────────────────────────────────────
// Use local calendar dates — never toISOString() which shifts in IST/other TZ
function localISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function today() { return localISO(new Date()); }
function parseLocal(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function getDate() { return document.getElementById('workout-date').value; }
function fmtDate(s) {
  if (!s) return '';
  return parseLocal(s).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}
function shiftDate(n) {
  const el = document.getElementById('workout-date');
  const d = parseLocal(el.value);
  d.setDate(d.getDate() + n);
  el.value = localISO(d);
  renderLog();
}
function goToday() {
  document.getElementById('workout-date').value = today();
  renderLog();
}

function getDayData(date)       { return DB[date] || {}; }
function setDayData(date, data) { DB[date] = data; persist(); }
function esc(s)                 { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ─────────────────────────────────────────
//  LOG TAB
// ─────────────────────────────────────────
let logCatFilter = 'All';

function renderLog() {
  const date  = getDate();
  const day   = getDayData(date);
  const names = Object.keys(day);

  // ── Rebuild category filter pills (only user-defined groups) ──
  const pillsEl = document.getElementById('cat-pills');
  if (pillsEl) {
    const pills = ['All', ...groups];
    pillsEl.innerHTML = pills.map(cat => {
      const color  = cat === 'All' ? '#818cf8' : catColor(cat);
      const active = logCatFilter === cat;
      return `<button class="cat-pill-btn${active?' active':''}"
        style="border-color:${color};color:${active?'#fff':color};background:${active?color:'transparent'}"
        onclick="logCatFilter='${cat}';renderLog()">
        <span class="cat-dot" style="background:${color}"></span>${cat}
      </button>`;
    }).join('');
  }

  // ── Populate category select in add panel (always sync with groups) ──
  const catSel = document.getElementById('cat-sel');
  if (catSel) {
    const cur = catSel.value;
    catSel.innerHTML = '<option value="">No group</option>' +
      groups.map(g => `<option value="${g}"${g===cur?' selected':''}>${g}</option>`).join('');
  }

  // ── Filter exercises ──
  const filtered = logCatFilter === 'All'
    ? names
    : names.filter(n => exCat(n) === logCatFilter);

  const el = document.getElementById('log-list');
  el.innerHTML = names.length === 0
    ? `<div class="empty"><div class="empty-ico">🏋️</div><p>No exercises yet for this day.<br>Add one below to start.</p></div>`
    : filtered.length === 0
      ? `<div class="empty" style="padding:24px"><p style="color:var(--muted)">No "${logCatFilter}" exercises today.</p></div>`
      : filtered.map(n => cardHTML(n, day[n])).join('');
}

function cardHTML(name, sets) {
  const done = sets.filter(s => s.done).length;
  const allDone = done === sets.length && sets.length > 0;
  let vol = 0;
  sets.forEach(s => { if (s.weight && s.reps) vol += parseFloat(s.weight) * parseInt(s.reps); });

  const rows = sets.map((s, i) => `
    <tr>
      <td><span class="set-num">${i+1}</span></td>
      <td><input class="num-inp" type="number" min="0" step="0.5" placeholder="—"
        value="${s.weight || ''}"
        oninput="updSet('${esc(name)}',${i},'weight',this.value)" onblur="updSet('${esc(name)}',${i},'weight',this.value)"></td>
      <td><input class="num-inp" type="number" min="0" step="1" placeholder="—"
        value="${s.reps || ''}"
        oninput="updSet('${esc(name)}',${i},'reps',this.value)" onblur="updSet('${esc(name)}',${i},'reps',this.value)"></td>
      <td>
        <button class="check-btn ${s.done ? 'done' : ''}" onclick="toggleDone('${esc(name)}',${i})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6.5L5 9.5L10 4" stroke="${s.done ? '#34d399' : '#6b6b80'}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </td>
      <td><button class="del-set-btn" onclick="delSet('${esc(name)}',${i})" title="Remove set">×</button></td>
    </tr>`).join('');

  const cat   = exCat(name);
  const color = catColor(cat);
  return `
    <div class="ex-card" style="border-top:3px solid ${color}">
      <div class="ex-head">
        <span class="ex-dot" style="background:${color}"></span>
        <span class="ex-name">${name}</span>
        <span class="ex-cat-tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${cat}</span>
        ${vol > 0 ? `<span class="ex-vol">${vol.toLocaleString()} kg vol</span>` : ''}
        <button class="del-ex-btn" onclick="delExercise('${esc(name)}')">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M4 3.5l.667 8h4.666L10 3.5"
              stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Delete
        </button>
      </div>
      <div class="sets-wrap">
        <table class="sets-tbl">
          <thead><tr>
            <th style="text-align:left">Set</th>
            <th>Weight (kg)</th>
            <th>Reps</th>
            <th>Done</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="ex-foot">
        <button class="add-set-btn" onclick="addSet('${esc(name)}')">+ add set</button>
        <span class="prog ${allDone ? 'done' : ''}">${done}/${sets.length} done</span>
      </div>
    </div>`;
}

function updSet(name, i, field, val) {
  const date = getDate(), day = getDayData(date);
  if (!day[name]?.[i]) return;
  day[name][i][field] = val;
  setDayData(date, day);
  // update volume badge without full re-render
  document.querySelectorAll('.ex-card').forEach(card => {
    const nm = card.querySelector('.ex-name');
    if (!nm || nm.textContent !== name) return;
    let v = 0;
    day[name].forEach(s => { if(s.weight && s.reps) v += parseFloat(s.weight) * parseInt(s.reps); });
    let ve = card.querySelector('.ex-vol');
    if (v > 0) {
      if (ve) ve.textContent = v.toLocaleString() + ' kg vol';
      else nm.insertAdjacentHTML('afterend', `<span class="ex-vol">${v.toLocaleString()} kg vol</span>`);
    } else if (ve) ve.remove();
  });
  // Live-refresh progress charts if that tab is open
  if (document.getElementById('pane-progress')?.classList.contains('on')) {
    drawCharts();
  }
}

function toggleDone(name, i) {
  const date = getDate(), day = getDayData(date);
  if (!day[name]?.[i]) return;
  day[name][i].done = !day[name][i].done;
  setDayData(date, day);
  renderLog();
}

function addSet(name) {
  const date = getDate(), day = getDayData(date);
  if (!day[name]) return;
  day[name].push({ weight: '', reps: '', done: false });
  setDayData(date, day);
  renderLog();
}

function delSet(name, i) {
  const date = getDate(), day = getDayData(date);
  if (!day[name] || day[name].length <= 1) { toast('Need at least 1 set', true); return; }
  day[name].splice(i, 1);
  setDayData(date, day);
  renderLog();
}

function delExercise(name) {
  if (!confirm(`Delete "${name}" for ${fmtDate(getDate())}?`)) return;
  const date = getDate(), day = getDayData(date);
  delete day[name];
  setDayData(date, day);
  renderLog();
  toast(`Deleted: ${name}`);
}

// ─────────────────────────────────────────
//  EXERCISE DROPDOWN
// ─────────────────────────────────────────
let dropHi = -1;

function onExInput(val) {
  const drop = document.getElementById('ex-drop');
  const q = val.trim().toLowerCase();
  const matches = exList.filter(e => !q || e.toLowerCase().includes(q));
  if (!matches.length && !q) { drop.classList.remove('open'); return; }

  const today_data = getDayData(getDate());

  // Group exercises by their assigned group; ungrouped go under "—"
  const grouped = {};   // { groupName: [exName,...] }
  const ungrouped = [];
  matches.forEach(e => {
    const g = exCat(e);
    if (g) {
      if (!grouped[g]) grouped[g] = [];
      grouped[g].push(e);
    } else {
      ungrouped.push(e);
    }
  });

  let html = '';
  // Groups first (in user-defined order)
  groups.forEach(g => {
    if (!grouped[g] || !grouped[g].length) return;
    const color = catColor(g);
    html += `<div class="drop-grp-hdr"><span class="drop-grp-dot" style="background:${color}"></span>${g}</div>`;
    grouped[g].forEach(e => {
      const days = Object.values(DB).filter(d => d[e]).length;
      html += `<div class="drop-item" onmousedown="pickExWithCat('${esc(e)}','${g}')">
        <span class="di-dot" style="background:${color}"></span>
        <span>${e}</span>
        ${today_data[e] ? '<span class="di-badge">today</span>' : ''}
        ${days > 0 ? `<span class="di-count">${days}d</span>` : ''}
      </div>`;
    });
  });
  // Ungrouped
  if (ungrouped.length) {
    if (html) html += `<div class="drop-grp-hdr"><span class="drop-grp-dot" style="background:#818cf8"></span>No group</div>`;
    ungrouped.forEach(e => {
      const days = Object.values(DB).filter(d => d[e]).length;
      html += `<div class="drop-item" onmousedown="pickExWithCat('${esc(e)}','')">
        <span class="di-dot"></span>
        <span>${e}</span>
        ${today_data[e] ? '<span class="di-badge">today</span>' : ''}
        ${days > 0 ? `<span class="di-count">${days}d</span>` : ''}
      </div>`;
    });
  }

  drop.innerHTML = html || `<div class="drop-none">Press Add to create "${val.trim()}"</div>`;
  drop.classList.add('open');
  dropHi = -1;
}

function onExKey(e) {
  const drop = document.getElementById('ex-drop');
  const items = drop.querySelectorAll('.drop-item');
  if (e.key === 'ArrowDown') {
    dropHi = Math.min(dropHi + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('hi', i === dropHi));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    dropHi = Math.max(dropHi - 1, 0);
    items.forEach((el, i) => el.classList.toggle('hi', i === dropHi));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    if (dropHi >= 0 && items[dropHi]) items[dropHi].dispatchEvent(new MouseEvent('mousedown'));
    else addExercise();
    e.preventDefault();
  } else if (e.key === 'Escape') {
    closeDrop();
  }
}

function closeDrop() { document.getElementById('ex-drop').classList.remove('open'); dropHi = -1; }
function pickEx(name) { document.getElementById('ex-inp').value = name; closeDrop(); }
function pickExWithCat(name, cat) {
  document.getElementById('ex-inp').value = name;
  const sel = document.getElementById('cat-sel');
  if (sel) sel.value = cat;
  closeDrop();
}
document.addEventListener('click', e => { if (!e.target.closest('.ex-wrap')) closeDrop(); });

function addExercise() {
  const inp = document.getElementById('ex-inp');
  const name = inp.value.trim();
  if (!name) { toast('Enter an exercise name', true); return; }
  const n   = parseInt(document.getElementById('sets-count').value);
  const cat = document.getElementById('cat-sel')?.value || '';
  const date = getDate(), day = getDayData(date);
  if (day[name]) { toast(`"${name}" is already added for today`, true); return; }
  day[name] = Array.from({ length: n }, () => ({ weight: '', reps: '', done: false }));
  setDayData(date, day);
  registerEx(name, cat || null);
  inp.value = '';
  const sel = document.getElementById('cat-sel');
  if (sel) sel.value = '';
  closeDrop();
  renderLog();
  toast(`Added: ${name}`);
}

// ─────────────────────────────────────────
//  HISTORY TAB
// ─────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-content');
  const dates = Object.keys(DB).sort((a, b) => b.localeCompare(a));
  if (!dates.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📅</div><p>No history yet.<br>Log a workout and save.</p></div>`;
    return;
  }
  el.innerHTML = dates.map(date => {
    const day = DB[date];
    const names = Object.keys(day);
    if (!names.length) return '';
    const cards = names.map(name => {
      const sets = day[name];
      let vol = 0;
      sets.forEach(s => { if (s.weight && s.reps) vol += parseFloat(s.weight) * parseInt(s.reps); });
      const rows = sets.map((s, i) => `
        <tr>
          <td>${i+1}</td>
          <td>${s.weight || '—'}</td>
          <td>${s.reps || '—'}</td>
          <td>${s.done ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--faint)">—</span>'}</td>
        </tr>`).join('');
      return `<div class="hist-card">
        <div class="hist-exname">
          <span class="ex-dot"></span>${name}
          ${vol > 0 ? `<span class="badge" style="margin-left:auto">${vol.toLocaleString()} kg</span>` : ''}
        </div>
        <table class="hist-tbl">
          <thead><tr><th>Set</th><th>Weight</th><th>Reps</th><th>Done</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');

    return `<div class="hist-group">
      <div class="hist-date-row">
        ${fmtDate(date)}
        <button class="btn btn-outline btn-sm" style="margin-left:auto"
          onclick="document.getElementById('workout-date').value='${date}';switchTab('log')">Edit</button>
        <button class="btn btn-red btn-sm"
          onclick="delDay('${date}')">Delete</button>
      </div>
      ${cards}
    </div>`;
  }).join('');
}

function delDay(date) {
  if (!confirm(`Delete all data for ${fmtDate(date)}?`)) return;
  delete DB[date];
  persist();
  renderHistory();
  toast('Day deleted');
}

// ─────────────────────────────────────────
//  STATS TAB
// ─────────────────────────────────────────
function renderStats() {
  const el = document.getElementById('stats-content');
  const dates = Object.keys(DB);
  if (!dates.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📊</div><p>No data yet.</p></div>`;
    return;
  }
  let totalSets = 0, totalVol = 0;
  const exMap = {};
  dates.forEach(d => {
    Object.entries(DB[d]).forEach(([name, sets]) => {
      totalSets += sets.length;
      sets.forEach(s => {
        if (s.weight && s.reps) totalVol += parseFloat(s.weight) * parseInt(s.reps);
      });
      exMap[name] = (exMap[name] || 0) + sets.length;
    });
  });
  const topRows = Object.entries(exMap)
    .sort((a, b) => b[1] - a[1]).slice(0, 10)
    .map(([name, sets]) => {
      const days = Object.values(DB).filter(d => d[name]).length;
      return `<tr>
        <td style="text-align:left;padding:8px 14px">
          <span class="ex-dot" style="display:inline-block;margin-right:8px;vertical-align:middle"></span>${name}
        </td>
        <td>${days}</td><td>${sets}</td>
      </tr>`;
    }).join('');

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num">${dates.length}</div><div class="stat-lbl">Days trained</div></div>
      <div class="stat-box"><div class="stat-num">${totalSets}</div><div class="stat-lbl">Total sets</div></div>
      <div class="stat-box"><div class="stat-num">${(totalVol/1000).toFixed(1)}t</div><div class="stat-lbl">Total volume</div></div>
    </div>
    <div class="sec-label">Top exercises</div>
    <div class="hist-card">
      <table class="hist-tbl">
        <thead><tr>
          <th style="text-align:left;padding-left:14px">Exercise</th>
          <th>Days</th><th>Sets</th>
        </tr></thead>
        <tbody>${topRows}</tbody>
      </table>
    </div>`;
}

// ─────────────────────────────────────────
//  EXCEL LOAD
//  Handles the visual format: Date+Exercise
//  are in a purple "header row" above the
//  set rows, so we carry them forward as
//  we scan down.
// ─────────────────────────────────────────
function loadExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellStyles: false });

      // Scan every sheet — each date gets its own tab, skip Summary/PRs
      const skipSheets = ['Summary','PRs','summary','prs'];
      const sheetsToRead = wb.SheetNames.filter(n => !skipSheets.some(s => n.toLowerCase().includes(s.toLowerCase())));

      let count = 0;
      sheetsToRead.forEach(wsName => {
        const ws = wb.Sheets[wsName];
        if (!ws) return;
        const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });

        // Find header row
        let headerIdx = -1;
        for (let i = 0; i < aoa.length; i++) {
          const row = aoa[i];
          if (row.some(c => String(c).trim() === 'Date') &&
              row.some(c => String(c).trim() === 'Exercise') &&
              row.some(c => String(c).trim() === 'Set')) {
            headerIdx = i; break;
          }
        }
        if (headerIdx === -1) return; // no data in this sheet

        const hdr     = aoa[headerIdx].map(c => String(c).trim());
        const ci      = name => hdr.indexOf(name);
        const iDate   = ci('Date');
        const iEx     = ci('Exercise');
        const iSet    = ci('Set');
        const iWeight = ci('Weight (kg)');
        const iReps   = ci('Reps');
        const iStatus = ci('Status');

        let curDate = '', curEx = '';

        for (let i = headerIdx + 1; i < aoa.length; i++) {
          const row     = aoa[i];
          const rawDate = String(row[iDate] || '').trim();
          const rawEx   = String(row[iEx]   || '').trim();
          const rawSet  = String(row[iSet]  || '').trim();
          const rawW    = String(iWeight >= 0 ? row[iWeight] || '' : '').trim();
          const rawR    = String(iReps   >= 0 ? row[iReps]   || '' : '').trim();
          const rawSt   = String(iStatus >= 0 ? row[iStatus] || '' : '').trim();

          // Skip non-data rows
          if (!rawSet || rawSet === 'Set' || rawSet.includes('sets') || rawSet === 'TOTAL' || rawSet.startsWith('↳')) {
            if (rawDate) curDate = normaliseDate(rawDate);
            if (rawEx && rawEx !== 'Exercise' && rawEx !== 'TOTAL' && !rawEx.startsWith('↳')) curEx = rawEx;
            continue;
          }

          if (rawDate) curDate = normaliseDate(rawDate);
          if (rawEx && rawEx !== 'Exercise') curEx = rawEx;
          if (!curDate || !curEx) continue;

          const si = parseInt(rawSet) - 1;
          if (isNaN(si) || si < 0) continue;

          if (!DB[curDate]) DB[curDate] = {};
          if (!DB[curDate][curEx]) DB[curDate][curEx] = [];
          while (DB[curDate][curEx].length <= si)
            DB[curDate][curEx].push({ weight: '', reps: '', done: false });

          const slot = DB[curDate][curEx][si];
          slot.weight = rawW;
          slot.reps   = rawR;
          slot.done   = rawSt.includes('Done') || rawSt.includes('✓') || rawSt.toLowerCase() === 'yes';
          registerEx(curEx);
          count++;
        }
      });

      persist();
      renderLog();
      toast(`Loaded ${count} set entries from ${file.name}`);
    } catch(err) {
      toast('Error reading file: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// Convert display dates like "Mar 14, 2026" back to "2026-03-14"
function normaliseDate(s) {
  if (!s) return '';
  s = s.trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Parse display dates like "Mar 14, 2026" using local time
  const d = new Date(s);
  if (!isNaN(d)) return localISO(d);
  return s;
}

// ─────────────────────────────────────────
//  EXCEL SAVE
//  First save: showSaveFilePicker so user
//  picks location once. Handle stored in
//  IndexedDB. Every subsequent save writes
//  directly to that same file — no download.
// ─────────────────────────────────────────
let _saveHandle = null;
const FS_SUPPORTED = ('showSaveFilePicker' in window);

// ── IndexedDB helpers ──
function _idb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('liftlog_fh', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('h');
    req.onsuccess = e => res(e.target.result);
    req.onerror   = () => rej();
  });
}
async function _storeHandle(h) {
  try { const db = await _idb(); db.transaction('h','readwrite').objectStore('h').put(h,'save'); } catch(e){}
}
async function _loadHandle() {
  try {
    const db = await _idb();
    return new Promise(res => {
      const r = db.transaction('h','readonly').objectStore('h').get('save');
      r.onsuccess = e => res(e.target.result || null);
      r.onerror   = () => res(null);
    });
  } catch(e) { return null; }
}
async function _clearHandle() {
  try { const db = await _idb(); db.transaction('h','readwrite').objectStore('h').delete('save'); } catch(e){}
}

function buildWB() {
  const dates = Object.keys(DB).sort();
  const wb = XLSX.utils.book_new();
  dates.forEach(date => buildDateSheet(wb, date));
  buildSummarySheet(wb);
  buildPRSheet(wb);
  return wb;
}

function wbToBlob(wb) {
  const out = XLSX.write(wb, { bookType:'xlsx', type:'array' });
  return new Blob([out], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
}

async function saveExcel() {
  const dates = Object.keys(DB).sort();
  if (!dates.length) { toast('Nothing to save yet', true); return; }

  const blob = wbToBlob(buildWB());

  // ── Try File System Access API (Chrome/Edge) ──
  if (FS_SUPPORTED) {
    // Re-use stored handle if we have one
    if (!_saveHandle) _saveHandle = await _loadHandle();

    // Verify permission on existing handle
    if (_saveHandle) {
      try {
        let perm = await _saveHandle.queryPermission({ mode:'readwrite' });
        if (perm !== 'granted') perm = await _saveHandle.requestPermission({ mode:'readwrite' });
        if (perm !== 'granted') _saveHandle = null; // lost permission, re-pick
      } catch(e) { _saveHandle = null; }
    }

    // No handle yet — show picker once
    if (!_saveHandle) {
      try {
        _saveHandle = await window.showSaveFilePicker({
          suggestedName: 'LiftLog.xlsx',
          types: [{ description:'Excel Workbook', accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx']} }]
        });
        await _storeHandle(_saveHandle);
      } catch(e) {
        if (e.name === 'AbortError') return; // user cancelled
        _saveHandle = null;
      }
    }

    if (_saveHandle) {
      try {
        const w = await _saveHandle.createWritable();
        await w.write(blob);
        await w.close();
        updateSaveBtn();
        toast('Saved → ' + _saveHandle.name + ' ✓');
        return;
      } catch(e) {
        _saveHandle = null;
        await _clearHandle();
        // fall through to download
      }
    }
  }

  // ── Fallback: plain download (Firefox / Safari) ──
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'LiftLog.xlsx'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Downloaded LiftLog.xlsx');
}

function updateSaveBtn() {
  const btn    = document.getElementById('btn-save');
  const forget = document.getElementById('btn-forget');
  if (!btn) return;
  if (_saveHandle) {
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 8.5v2a1 1 0 01-1 1H3a1 1 0 01-1-1v-2M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Save → ${_saveHandle.name}`;
    btn.title = 'Saves directly to: ' + _saveHandle.name;
    if (forget) forget.style.display = 'block';
  } else {
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 8.5v2a1 1 0 01-1 1H3a1 1 0 01-1-1v-2M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Save Excel`;
    btn.title = FS_SUPPORTED ? 'Pick where to save LiftLog.xlsx — remembered for next time' : 'Downloads LiftLog.xlsx';
    if (forget) forget.style.display = 'none';
  }
}

async function forgetSaveFile() {
  _saveHandle = null;
  await _clearHandle();
  updateSaveBtn();
  toast('Save location cleared — next save will ask again');
}

// ── colour palette ──
const C = {
  darkNavy:'1A1A2E', navy:'16213E', midBlue:'0F3460', purple:'533483',
  accentDark:'3730A3', white:'FFFFFF', offWhite:'F8F9FF',
  lightGray:'E8EAF6', midGray:'C5CAE9', darkGray:'78829A',
  altRow:'EEEEFF', border:'C5CAE9',
  greenDark:'065F46', greenBg:'DCFCE7',
  redTxt:'991B1B', redBg:'FEE2E2',
};

function cs(o) {
  const s = {};
  if (o.bold || o.sz || o.color || o.italic)
    s.font = { bold:!!o.bold, sz:o.sz||11, color:{rgb:o.color||C.darkNavy}, italic:!!o.italic, name:'Calibri' };
  if (o.bg)
    s.fill = { patternType:'solid', fgColor:{rgb:o.bg} };
  if (o.h || o.v)
    s.alignment = { horizontal:o.h||'left', vertical:o.v||'center', wrapText:false };
  if (o.border) {
    const t = (c) => ({ style:'thin',   color:{rgb:c||C.border} });
    const m = (c) => ({ style:'medium', color:{rgb:c||C.midBlue} });
    s.border = {
      top:    o.borderTop    ? m(o.borderColor) : t(o.borderColor),
      bottom: o.borderBottom ? m(o.borderColor) : t(o.borderColor),
      left:   t(o.borderColor),
      right:  t(o.borderColor),
    };
  }
  return s;
}

function sc(ws, r, c, v, style, fmt) {
  const addr = XLSX.utils.encode_cell({r, c});
  const t = typeof v === 'number' ? 'n' : 's';
  ws[addr] = { v, t, s: style || {} };
  if (fmt) ws[addr].z = fmt;
}

function titleBlock(ws, merges, r, title, sub, nc) {
  sc(ws,r,0,title, cs({bold:true,sz:15,color:C.white,bg:C.darkNavy,h:'center',v:'center'}));
  for(let c=1;c<nc;c++) sc(ws,r,c,'',cs({bg:C.darkNavy}));
  merges.push({s:{r,c:0},e:{r,c:nc-1}}); r++;
  if (sub) {
    sc(ws,r,0,sub, cs({italic:true,sz:10,color:C.midGray,bg:C.navy,h:'center'}));
    for(let c=1;c<nc;c++) sc(ws,r,c,'',cs({bg:C.navy}));
    merges.push({s:{r,c:0},e:{r,c:nc-1}}); r++;
  }
  for(let c=0;c<nc;c++) sc(ws,r,c,'',{}); r++;  // spacer
  return r;
}

function headerRow(ws, r, headers, bgColor) {
  headers.forEach((h, c) => {
    sc(ws,r,c,h, cs({bold:true,sz:11,color:C.white,bg:bgColor||C.midBlue,h:'center',border:true,borderTop:true,borderBottom:true,borderColor:C.accentDark}));
  });
  return r + 1;
}

function buildDateSheet(wb, date) {
  const ws = {}; ws['!merges'] = []; let r = 0;
  const NC = 7;
  const day = DB[date];
  const names = Object.keys(day);
  if (!names.length) return;

  const dispDate = parseLocal(date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  // Title
  sc(ws,r,0,dispDate, cs({bold:true,sz:14,color:C.white,bg:C.darkNavy,h:'center',v:'center'}));
  for(let c=1;c<NC;c++) sc(ws,r,c,'',cs({bg:C.darkNavy}));
  ws['!merges'].push({s:{r,c:0},e:{r,c:NC-1}}); r++;
  for(let c=0;c<NC;c++) sc(ws,r,c,'',{}); r++;

  r = headerRow(ws, r, ['Date','Exercise','Set','Weight (kg)','Reps','Volume (kg)','Status']);

  // ── Group exercises: assigned ones bucketed by group (in user order),
  //    unassigned ones appended at the end under no header ──
  const grouped   = {};  // { groupName: [exName, ...] }
  const ungrouped = [];
  names.forEach(name => {
    const g = exCat(name);
    if (g) { if (!grouped[g]) grouped[g] = []; grouped[g].push(name); }
    else ungrouped.push(name);
  });

  // Build ordered list: groups in user-defined order, then ungrouped
  const orderedGroups = groups.filter(g => grouped[g]);  // only groups present today
  const hasAnyGroup   = orderedGroups.length > 0;

  function writeExercise(name) {
    const sets = day[name];
    sets.forEach((s, si) => {
      const bg  = si % 2 === 0 ? C.offWhite : C.altRow;
      const w   = parseFloat(s.weight) || 0;
      const rep = parseInt(s.reps)     || 0;
      const vol = (w && rep) ? w * rep : '';
      sc(ws,r,0,date,  cs({color:C.darkGray,h:'center',bg,border:true}));
      sc(ws,r,1,name,  cs({bold:si===0,color:si===0?C.midBlue:C.darkGray,bg,border:true}));
      sc(ws,r,2,si+1,  cs({bold:true,color:C.midBlue,h:'center',bg,border:true}));
      sc(ws,r,3,s.weight!==''?(parseFloat(s.weight)||''):'', cs({h:'center',bg,border:true}),'#,##0.0');
      sc(ws,r,4,s.reps!==''?(parseInt(s.reps)||''):'',       cs({h:'center',bg,border:true}));
      sc(ws,r,5,vol!==''?vol:'', cs({bold:!!vol,color:vol?C.midBlue:C.darkGray,h:'center',bg,border:true}),'#,##0.0');
      sc(ws,r,6,s.done?'✓  Done':'○  Pending',
        cs({bold:s.done,color:s.done?C.greenDark:C.darkGray,h:'center',bg:s.done?C.greenBg:bg,border:true}));
      r++;
    });
    // Exercise totals row
    const valid  = sets.filter(s => s.weight && s.reps);
    const totVol = valid.reduce((a,s) => a+parseFloat(s.weight)*parseInt(s.reps), 0);
    const maxW   = Math.max(0, ...sets.map(s => parseFloat(s.weight)||0));
    sc(ws,r,0,'',         cs({bg:C.lightGray,border:true}));
    sc(ws,r,1,'↳ '+name,  cs({italic:true,color:C.darkGray,bg:C.lightGray,border:true}));
    sc(ws,r,2,sets.length+' sets', cs({italic:true,color:C.darkGray,h:'center',bg:C.lightGray,border:true}));
    sc(ws,r,3,maxW||'',   cs({bold:true,color:C.midBlue,h:'center',bg:C.lightGray,border:true}),'#,##0.0');
    sc(ws,r,4,'',         cs({bg:C.lightGray,border:true}));
    sc(ws,r,5,totVol||'', cs({bold:true,color:C.accentDark,h:'center',bg:C.lightGray,border:true}),'#,##0.0');
    sc(ws,r,6,valid.length+'/'+sets.length+' logged',
      cs({italic:true,color:C.darkGray,h:'center',bg:C.lightGray,border:true}));
    r++;
    for(let c=0;c<NC;c++) sc(ws,r,c,'',{}); r++;
  }

  // Write grouped exercises under their group header
  orderedGroups.forEach(g => {
    const color  = catColor(g);
    const hexBg  = color.replace('#','');
    // Group header row spanning all columns
    sc(ws,r,0,'▸ '+g.toUpperCase(), cs({bold:true,sz:11,color:C.white,bg:hexBg,h:'left',border:true,borderColor:hexBg}));
    for(let c=1;c<NC;c++) sc(ws,r,c,'',cs({bg:hexBg,border:true,borderColor:hexBg}));
    r++;
    grouped[g].forEach(name => writeExercise(name));
  });

  // Write ungrouped exercises — no header if there are also grouped ones, clean separation
  if (ungrouped.length) {
    if (hasAnyGroup) {
      // subtle "other" divider only when mixed
      sc(ws,r,0,'▸ OTHER', cs({bold:true,sz:11,color:C.white,bg:C.darkGray,h:'left',border:true,borderColor:C.darkGray}));
      for(let c=1;c<NC;c++) sc(ws,r,c,'',cs({bg:C.darkGray,border:true,borderColor:C.darkGray}));
      r++;
    }
    ungrouped.forEach(name => writeExercise(name));
  }

  ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0},e:{r,c:NC-1}});
  ws['!cols'] = [{wch:13},{wch:26},{wch:7},{wch:13},{wch:8},{wch:13},{wch:13}];
  ws['!rows'] = [{hpt:26}];

  const tabName = parseLocal(date).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'2-digit'});
  let finalName = tabName, n = 2;
  while (wb.SheetNames.includes(finalName)) finalName = tabName + ' (' + (n++) + ')';
  XLSX.utils.book_append_sheet(wb, ws, finalName);
}

function buildGroupSheet(wb, groupName) {
  // Collect all exercises in this group and all dates they were logged
  const allDates = Object.keys(DB).sort();
  const members  = [...new Set(
    allDates.flatMap(d => Object.keys(DB[d]).filter(ex => exCat(ex) === groupName))
  )].sort();

  if (!members.length) return; // nothing to show

  const ws = {}; ws['!merges'] = []; let r = 0;
  const NC = 7;
  const color  = catColor(groupName);
  // Convert hex to RGB for title bg — use midBlue as fallback since xlsx needs 6-char hex
  const titleBg = color.replace('#','');

  // Title
  sc(ws,r,0,groupName.toUpperCase() + ' — GROUP LOG',
    cs({bold:true,sz:14,color:C.white,bg:titleBg,h:'center',v:'center'}));
  for(let c=1;c<NC;c++) sc(ws,r,c,'',cs({bg:titleBg}));
  ws['!merges'].push({s:{r,c:0},e:{r,c:NC-1}}); r++;

  const sub = `${members.length} exercise${members.length>1?'s':''} · ${allDates.filter(d=>Object.keys(DB[d]).some(ex=>exCat(ex)===groupName)).length} sessions`;
  sc(ws,r,0,sub, cs({italic:true,sz:10,color:C.midGray,bg:C.navy,h:'center'}));
  for(let c=1;c<NC;c++) sc(ws,r,c,'',cs({bg:C.navy}));
  ws['!merges'].push({s:{r,c:0},e:{r,c:NC-1}}); r++;
  for(let c=0;c<NC;c++) sc(ws,r,c,'',{}); r++;

  r = headerRow(ws, r, ['Date','Exercise','Set','Weight (kg)','Reps','Volume (kg)','Status']);

  // One block per date that has this group's exercises
  allDates.forEach(date => {
    const dayData = DB[date];
    const dayMembers = members.filter(ex => dayData[ex]);
    if (!dayMembers.length) return;

    const dispDate = parseLocal(date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

    dayMembers.forEach(name => {
      const sets = dayData[name];

      // Exercise header row
      sc(ws,r,0,dispDate, cs({bold:true,sz:10,color:C.white,bg:C.purple,border:true,borderColor:C.accentDark}));
      sc(ws,r,1,name,     cs({bold:true,sz:11,color:C.white,bg:C.purple,border:true,borderColor:C.accentDark}));
      for(let c=2;c<NC;c++) sc(ws,r,c,'',cs({bg:C.purple,border:true,borderColor:C.accentDark}));
      r++;

      // Set rows
      sets.forEach((s,si) => {
        const bg  = si%2===0 ? C.offWhite : C.altRow;
        const w   = parseFloat(s.weight)||0;
        const rep = parseInt(s.reps)||0;
        const vol = (w&&rep) ? w*rep : '';
        sc(ws,r,0,date,  cs({color:C.darkGray,h:'center',bg,border:true}));
        sc(ws,r,1,name,  cs({color:C.darkGray,bg,border:true}));
        sc(ws,r,2,si+1,  cs({bold:true,color:C.midBlue,h:'center',bg,border:true}));
        sc(ws,r,3,s.weight!==''?(parseFloat(s.weight)||''):'', cs({h:'center',bg,border:true}),'#,##0.0');
        sc(ws,r,4,s.reps!==''?(parseInt(s.reps)||''):'',       cs({h:'center',bg,border:true}));
        sc(ws,r,5,vol!==''?vol:'', cs({bold:!!vol,color:vol?C.midBlue:C.darkGray,h:'center',bg,border:true}),'#,##0.0');
        sc(ws,r,6,s.done?'✓  Done':'○  Pending',
          cs({bold:s.done,color:s.done?C.greenDark:C.darkGray,h:'center',bg:s.done?C.greenBg:bg,border:true}));
        r++;
      });

      // Exercise totals row
      const valid  = sets.filter(s=>s.weight&&s.reps);
      const totVol = valid.reduce((a,s)=>a+parseFloat(s.weight)*parseInt(s.reps),0);
      const maxW   = Math.max(0,...sets.map(s=>parseFloat(s.weight)||0));
      sc(ws,r,0,'',           cs({bg:C.lightGray,border:true}));
      sc(ws,r,1,'↳ '+name,    cs({italic:true,color:C.darkGray,bg:C.lightGray,border:true}));
      sc(ws,r,2,sets.length+' sets', cs({italic:true,color:C.darkGray,h:'center',bg:C.lightGray,border:true}));
      sc(ws,r,3,maxW||'',     cs({bold:true,color:C.midBlue,h:'center',bg:C.lightGray,border:true}),'#,##0.0');
      sc(ws,r,4,'',           cs({bg:C.lightGray,border:true}));
      sc(ws,r,5,totVol||'',   cs({bold:true,color:C.accentDark,h:'center',bg:C.lightGray,border:true}),'#,##0.0');
      sc(ws,r,6,valid.length+'/'+sets.length+' logged',
        cs({italic:true,color:C.darkGray,h:'center',bg:C.lightGray,border:true}));
      r++;
    });
    // Spacer between dates
    for(let c=0;c<NC;c++) sc(ws,r,c,'',{}); r++;
  });

  // Group summary at bottom
  for(let c=0;c<NC;c++) sc(ws,r,c,'',{}); r++;
  sc(ws,r,0,'GROUP TOTALS',cs({bold:true,sz:11,color:C.white,bg:C.midBlue,border:true}));
  for(let c=1;c<NC;c++) sc(ws,r,c,'',cs({bg:C.midBlue,border:true}));
  r++;

  members.forEach((name,i) => {
    const bg = i%2===0?C.offWhite:C.altRow;
    let totalSets=0,totalVol=0,maxW=0,sessions=0;
    allDates.forEach(date => {
      const sets = DB[date]?.[name]; if(!sets) return;
      sessions++;
      sets.forEach(s=>{
        totalSets++;
        const w=parseFloat(s.weight)||0,rep=parseInt(s.reps)||0;
        if(w&&rep) totalVol+=w*rep;
        if(w) maxW=Math.max(maxW,w);
      });
    });
    sc(ws,r,0,'',              cs({bg,border:true}));
    sc(ws,r,1,name,            cs({bold:true,bg,border:true}));
    sc(ws,r,2,sessions,        cs({h:'center',bg,border:true}));
    sc(ws,r,3,totalSets,       cs({h:'center',bg,border:true}));
    sc(ws,r,4,Math.round(totalVol), cs({bold:true,color:C.midBlue,h:'center',bg,border:true}),'#,##0');
    sc(ws,r,5,maxW||'',        cs({h:'center',bg,border:true}),'#,##0.0');
    sc(ws,r,6,'',              cs({bg,border:true}));
    r++;
  });

  ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0},e:{r,c:NC-1}});
  ws['!cols'] = [{wch:13},{wch:26},{wch:7},{wch:13},{wch:8},{wch:13},{wch:13}];
  ws['!rows'] = [{hpt:26}];

  // Sheet tab name = group name (truncated to 31 chars, Excel limit)
  let tabName = groupName.slice(0,28);
  let n=2; const existing = wb.SheetNames;
  while(existing.includes(tabName)) tabName = groupName.slice(0,25)+' ('+(n++)+')';
  XLSX.utils.book_append_sheet(wb, ws, tabName);
}

function buildSummarySheet(wb) {
  const ws = {}; ws['!merges'] = []; let r = 0; const NC = 7;
  r = titleBlock(ws, ws['!merges'], r, 'EXERCISE SUMMARY', 'All-time stats by exercise', NC);
  r = headerRow(ws, r, ['Group','Exercise','Days Trained','Total Sets','Total Volume (kg)','Max Weight (kg)','Completion %']);

  const ex = {};
  Object.entries(DB).forEach(([date, day]) => {
    Object.entries(day).forEach(([name, sets]) => {
      if (!ex[name]) ex[name] = {days:new Set(), sets:0, vol:0, maxW:0, done:0};
      ex[name].days.add(date);
      ex[name].sets += sets.length;
      ex[name].done += sets.filter(s=>s.done).length;
      sets.forEach(s => {
        const w=parseFloat(s.weight)||0, rp=parseInt(s.reps)||0;
        if(w&&rp) ex[name].vol += w*rp;
        if(w) ex[name].maxW = Math.max(ex[name].maxW,w);
      });
    });
  });

  // Sort: by group first, then by volume
  Object.entries(ex).sort((a,b) => {
    const ga = exCat(a[0]) || 'zzz', gb = exCat(b[0]) || 'zzz';
    if (ga !== gb) return ga.localeCompare(gb);
    return b[1].vol - a[1].vol;
  }).forEach(([name,d],i) => {
    const bg  = i%2===0 ? C.offWhite : C.altRow;
    const pct = d.sets>0 ? Math.round(d.done/d.sets*100)+'%' : '—';
    const allDone = d.done===d.sets && d.sets>0;
    const grp = exCat(name) || '—';
    sc(ws,r,0,grp,              cs({italic:!exCat(name),color:exCat(name)?C.midBlue:C.darkGray,bg,border:true}));
    sc(ws,r,1,name,             cs({bold:true,bg,border:true}));
    sc(ws,r,2,d.days.size,      cs({h:'center',bg,border:true}));
    sc(ws,r,3,d.sets,           cs({h:'center',bg,border:true}));
    sc(ws,r,4,Math.round(d.vol),cs({bold:true,color:C.midBlue,h:'center',bg,border:true}),'#,##0');
    sc(ws,r,5,d.maxW||'',       cs({h:'center',bg,border:true}),'#,##0.0');
    sc(ws,r,6,pct,              cs({bold:true,color:allDone?C.greenDark:C.darkGray,h:'center',bg:allDone?C.greenBg:bg,border:true}));
    r++;
  });

  ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0},e:{r,c:NC-1}});
  ws['!cols'] = [{wch:16},{wch:26},{wch:14},{wch:12},{wch:19},{wch:16},{wch:14}];
  ws['!rows'] = [{hpt:26},{hpt:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Summary');
}

function buildPRSheet(wb) {
  const ws = {}; ws['!merges'] = []; let r = 0; const NC = 4;
  r = titleBlock(ws, ws['!merges'], r, '🏆  PERSONAL RECORDS', 'Heaviest weight ever lifted per exercise', NC);
  r = headerRow(ws, r, ['Exercise','Max Weight (kg)','Date Achieved','Total Sessions']);

  const pr = {};
  Object.entries(DB).forEach(([date, day]) => {
    Object.entries(day).forEach(([name, sets]) => {
      if (!pr[name]) pr[name] = {w:0, date:'', sessions:0};
      pr[name].sessions++;
      sets.forEach(s => {
        const w=parseFloat(s.weight)||0;
        if(w>pr[name].w) { pr[name].w=w; pr[name].date=date; }
      });
    });
  });

  Object.entries(pr).sort((a,b)=>b[1].w-a[1].w).forEach(([name,d],i) => {
    const bg = i%2===0 ? C.offWhite : C.altRow;
    const dd = d.date ? new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    sc(ws,r,0,name,       cs({bold:true,bg,border:true}));
    sc(ws,r,1,d.w||'',    cs({bold:true,color:C.midBlue,h:'center',bg,border:true}),'#,##0.0');
    sc(ws,r,2,dd,         cs({italic:true,color:C.darkGray,h:'center',bg,border:true}));
    sc(ws,r,3,d.sessions, cs({h:'center',bg,border:true}));
    r++;
  });

  ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0},e:{r,c:NC-1}});
  ws['!cols'] = [{wch:28},{wch:17},{wch:17},{wch:15}];
  ws['!rows'] = [{hpt:26},{hpt:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'PRs');
}

// ─────────────────────────────────────────
//  TABS + TOAST
// ─────────────────────────────────────────

// ─────────────────────────────────────────
//  PROGRESS TAB
// ─────────────────────────────────────────
let progMetric   = 'weight';   // 'weight' | 'reps' | 'volume'
let progEx       = '';
let progCat      = '';
let progViewMode = 'exercise'; // 'exercise' | 'group'

// ── Called every time we switch to Progress tab ──
function renderProgress() {
  const el = document.getElementById('progress-content');

  // Build data: all exercises that have any logged data
  const allEx = [];
  Object.values(DB).forEach(day => {
    Object.keys(day).forEach(n => { if (!allEx.includes(n)) allEx.push(n); });
  });
  allEx.sort();

  // Categories that have data
  const allCats = [...new Set(allEx.map(n => exCat(n)))].sort();

  if (!allEx.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">📈</div><p>No workout data yet.<br>Log some exercises first.</p></div>';
    return;
  }

  if (!progCat || !allCats.includes(progCat)) progCat = allCats[0] || '';
  if (!progEx  || !allEx.includes(progEx))    progEx  = allEx[0]  || '';

  const catOptions = allCats.map(c =>
    `<option value="${c}"${c===progCat?' selected':''}>${c}</option>`).join('');
  const exOptions = allEx
    .filter(n => progViewMode === 'group' ? exCat(n) === progCat : true)
    .map(n => `<option value="${n}"${n===progEx?' selected':''}>${n}</option>`).join('');

  el.innerHTML = `
    <div class="progress-shell">
      <!-- View mode toggle -->
      <div class="prog-view-toggle">
        <label>View by</label>
        <button class="pvt-btn${progViewMode==='exercise'?' on':''}" onclick="progViewMode='exercise';renderProgress()">Exercise</button>
        <button class="pvt-btn${progViewMode==='group'?' on':''}"    onclick="progViewMode='group';renderProgress()">Group</button>
      </div>

      <!-- Selectors row -->
      <div class="ex-selector-row">
        ${progViewMode==='group' ? `
          <label>Group</label>
          <select class="ex-select" id="prog-cat-sel" onchange="progCat=this.value;renderProgress()">${catOptions}</select>
        ` : `
          <label>Exercise</label>
          <select class="ex-select" id="prog-ex-sel" onchange="progEx=this.value;drawCharts()">${exOptions}</select>
        `}
        <div class="metric-toggle">
          <button class="metric-btn${progMetric==='weight'?' on':''}" onclick="setMetric('weight')">Weight</button>
          <button class="metric-btn${progMetric==='reps'?' on':''}"   onclick="setMetric('reps')">Reps</button>
          <button class="metric-btn${progMetric==='volume'?' on':''}" onclick="setMetric('volume')">Volume</button>
        </div>
      </div>

      ${progViewMode==='group' ? `
        <!-- GROUP VIEW: one chart per exercise in the group -->
        <div id="group-charts"></div>
        <div class="chart-card" style="margin-top:14px">
          <div class="chart-title">Group personal records</div>
          <div class="pr-chips" id="pr-chips"></div>
        </div>
      ` : `
        <!-- SINGLE EXERCISE VIEW -->
        <div class="chart-card">
          <div class="chart-title">
            <span id="chart-main-label">—</span>
            <span id="chart-main-pr" style="font-size:11px;color:var(--accent);font-weight:500;margin-left:10px"></span>
          </div>
          <div class="chart-wrap"><canvas id="chart-main"></canvas></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
          <div class="chart-card">
            <div class="chart-title">Max weight per session</div>
            <div class="chart-wrap"><canvas id="chart-w"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">Max reps per session</div>
            <div class="chart-wrap"><canvas id="chart-r"></canvas></div>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Personal records</div>
          <div class="pr-chips" id="pr-chips"></div>
        </div>
      `}
    </div>`;

  requestAnimationFrame(() => {
    if (progViewMode === 'group') drawGroupCharts();
    else drawCharts();
  });
}

function setMetric(m) {
  progMetric = m;
  document.querySelectorAll('.metric-btn').forEach(b => {
    b.classList.toggle('on', b.textContent.toLowerCase() === m);
  });
  if (progViewMode === 'group') drawGroupCharts();
  else drawCharts();
}

function getExData(name) {
  return Object.keys(DB).sort().map(date => {
    const sets = DB[date]?.[name];
    if (!sets || !sets.length) return null;
    const weights = sets.map(s => parseFloat(s.weight)||0).filter(v => v > 0);
    const reps    = sets.map(s => parseInt(s.reps)||0).filter(v => v > 0);
    const vol     = sets.reduce((a, s) => {
      const w = parseFloat(s.weight)||0, r = parseInt(s.reps)||0;
      return a + (w && r ? w * r : 0);
    }, 0);
    return {
      date,
      label:     parseLocal(date).toLocaleDateString('en-US', {month:'short', day:'numeric'}),
      maxWeight: weights.length ? Math.max(...weights) : 0,
      maxReps:   reps.length    ? Math.max(...reps)    : 0,
      totalVol:  vol,
      sets:      sets.length
    };
  }).filter(Boolean);
}

const COPT = {
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 300 },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#1e1e24', borderColor: '#383848', borderWidth: 1,
      titleColor: '#eeeef0', bodyColor: '#818cf8', padding: 10
    }
  },
  scales: {
    x: { grid: { color: '#2a2a35' }, ticks: { color: '#6b6b80', font: { size: 11 } } },
    y: { grid: { color: '#2a2a35' }, ticks: { color: '#6b6b80', font: { size: 11 } }, beginAtZero: false }
  }
};

const _charts = {};
function destroyChart(id) {
  if (_charts[id]) { try { _charts[id].destroy(); } catch(e){} delete _charts[id]; }
}
function makeChart(id, cfg) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  _charts[id] = new Chart(ctx, cfg);
}

function lineChart(id, labels, vals, color, unit) {
  if (!vals.length || !document.getElementById(id)) return;
  const peak = vals.lastIndexOf(Math.max(...vals));
  makeChart(id, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: vals,
        borderColor: color,
        backgroundColor: color + '18',
        pointBackgroundColor: vals.map((_,i) => i===peak ? '#f87171' : color),
        pointBorderColor: '#0d0d10',
        pointBorderWidth: 2,
        pointRadius: vals.map((_,i) => i===peak ? 9 : 5),
        pointHoverRadius: 9,
        fill: true, tension: 0.35, borderWidth: 2.5
      }]
    },
    options: {
      ...COPT,
      plugins: {
        ...COPT.plugins,
        tooltip: { ...COPT.plugins.tooltip, callbacks: { label: c => c.parsed.y + unit } }
      }
    }
  });
}

// ── Single exercise view ──
function drawCharts() {
  const sel = document.getElementById('prog-ex-sel');
  if (sel) progEx = sel.value;

  const data   = getExData(progEx);
  const labels = data.map(d => d.label);
  const color  = catColor(exCat(progEx));

  if (!data.length) {
    ['chart-main','chart-w','chart-r'].forEach(id => destroyChart(id));
    const pc = document.getElementById('pr-chips');
    if (pc) pc.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px">No data for this exercise yet.</div>';
    return;
  }

  const metricCfg = {
    weight: { key:'maxWeight', color, title:'Max weight over time',       unit:' kg'      },
    reps:   { key:'maxReps',   color:'#34d399', title:'Max reps over time',  unit:' reps'    },
    volume: { key:'totalVol',  color:'#fbbf24', title:'Total volume per session', unit:' kg vol' }
  };
  const mc   = metricCfg[progMetric];
  const vals = data.map(d => d[mc.key]);
  const peakVal = Math.max(...vals);
  const peakIdx = vals.lastIndexOf(peakVal);

  const lbl = document.getElementById('chart-main-label');
  const pr  = document.getElementById('chart-main-pr');
  if (lbl) lbl.textContent = mc.title;
  if (pr)  pr.textContent  = `PR: ${peakVal}${mc.unit} on ${data[peakIdx].label}`;

  lineChart('chart-main', labels, vals, mc.color, mc.unit);
  lineChart('chart-w', labels, data.map(d => d.maxWeight), color, ' kg');
  lineChart('chart-r', labels, data.map(d => d.maxReps),   '#34d399', ' reps');

  const prEl = document.getElementById('pr-chips');
  if (prEl) {
    const bestW = Math.max(...data.map(d => d.maxWeight));
    const bestR = Math.max(...data.map(d => d.maxReps));
    const bestV = Math.max(...data.map(d => d.totalVol));
    prEl.innerHTML = [
      bestW ? `<div class="pr-chip">🏋️ Max weight <strong>${bestW} kg</strong></div>` : '',
      bestR ? `<div class="pr-chip">🔁 Max reps <strong>${bestR}</strong></div>` : '',
      bestV ? `<div class="pr-chip">⚡ Best volume <strong>${bestV.toLocaleString()} kg</strong></div>` : '',
      `<div class="pr-chip">📅 Sessions <strong>${data.length}</strong></div>`,
      `<div class="pr-chip">📊 Total sets <strong>${data.reduce((a,d)=>a+d.sets,0)}</strong></div>`,
    ].join('');
  }
}

// ── Group view: one mini chart per exercise in the category ──
function drawGroupCharts() {
  const container = document.getElementById('group-charts');
  if (!container) return;

  // Get all exercises in this category that have data
  const allEx = [];
  Object.values(DB).forEach(day => Object.keys(day).forEach(n => {
    if (!allEx.includes(n)) allEx.push(n);
  }));
  const groupEx = allEx.filter(n => exCat(n) === progCat).sort();

  if (!groupEx.length) {
    container.innerHTML = '<div class="empty" style="padding:28px"><p>No exercises logged for this group yet.</p></div>';
    const pr = document.getElementById('pr-chips');
    if (pr) pr.innerHTML = '';
    return;
  }

  const metricCfg = {
    weight: { key:'maxWeight', unit:' kg',      label:'Max weight'     },
    reps:   { key:'maxReps',   unit:' reps',    label:'Max reps'       },
    volume: { key:'totalVol',  unit:' kg vol',  label:'Volume'         }
  };
  const mc    = metricCfg[progMetric];
  const color = catColor(progCat);

  // Build one chart card per exercise
  container.innerHTML = groupEx.map(name =>
    `<div class="chart-card" style="margin-bottom:14px;border-top:3px solid ${color}">
      <div class="chart-title" style="color:${color}">${name} <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px">${mc.label}</span></div>
      <div class="chart-wrap" style="height:180px"><canvas id="gchart-${name.replace(/[^a-z0-9]/gi,'_')}"></canvas></div>
    </div>`
  ).join('');

  // Draw each chart
  groupEx.forEach(name => {
    const data   = getExData(name);
    const labels = data.map(d => d.label);
    const vals   = data.map(d => d[mc.key]);
    if (!vals.length) return;
    lineChart('gchart-' + name.replace(/[^a-z0-9]/gi,'_'), labels, vals, color, mc.unit);
  });

  // Group PR chips
  const prEl = document.getElementById('pr-chips');
  if (prEl) {
    const chips = groupEx.map(name => {
      const data = getExData(name);
      if (!data.length) return '';
      const bestW = Math.max(...data.map(d => d.maxWeight));
      const bestR = Math.max(...data.map(d => d.maxReps));
      return `<div class="pr-chip" style="border-color:${color}44;background:${color}11;color:${color}">
        <strong>${name}</strong> — ${bestW}kg × ${bestR} reps
      </div>`;
    }).join('');
    prEl.innerHTML = chips || '<span style="color:var(--muted);font-size:13px">No data yet.</span>';
  }
}



// ─────────────────────────────────────────
//  GROUPS TAB
// ─────────────────────────────────────────
function renderGroups() {
  const el = document.getElementById('groups-content');

  // exercises that exist in DB or exList
  const allEx = [...new Set([...exList, ...Object.values(DB).flatMap(d => Object.keys(d))])].sort();

  const groupCards = groups.length === 0
    ? `<div class="empty" style="padding:32px 20px"><div class="empty-ico">🗂️</div><p>No groups yet.<br>Create one above to organise your exercises.</p></div>`
    : groups.map(g => {
        const color   = catColor(g);
        const members = allEx.filter(e => exCat(e) === g);
        const chips   = members.map(e => `
          <span class="group-ex-chip" style="background:${color}15;color:${color};border-color:${color}40">
            ${e}
            <button onclick="removeExFromGroup('${esc(e)}')" title="Remove from group">×</button>
          </span>`).join('');

        // Exercises not yet in this group (for the assign dropdown)
        const unassigned = allEx.filter(e => !exCat(e) || exCat(e) === g);

        return `
          <div class="group-card" style="border-top:3px solid ${color}">
            <div class="group-card-head">
              <div class="group-color-bar" style="background:${color}"></div>
              <span class="group-name">${g}</span>
              <span class="group-count">${members.length} exercises</span>
              <button class="del-ex-btn" onclick="confirmDeleteGroup('${esc(g)}')">
                <svg viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M4 3.5l.667 8h4.666L10 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Delete group
              </button>
            </div>
            <div class="group-ex-list">
              ${chips || `<span style="color:var(--muted);font-size:13px;font-style:italic">No exercises assigned yet.</span>`}
            </div>
            <div class="group-add-row">
              <select class="assign-sel" id="assign-sel-${esc(g)}">
                <option value="">Add exercise to this group…</option>
                ${allEx.filter(e => exCat(e) !== g).map(e =>
                  `<option value="${esc(e)}">${e}${exCat(e) ? ' ('+exCat(e)+')' : ''}</option>`
                ).join('')}
              </select>
              <button class="btn btn-accent btn-sm" onclick="addExToGroup('${esc(g)}')">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                Assign
              </button>
            </div>
          </div>`;
      }).join('');

  el.innerHTML = `
    <div class="sec-label" style="margin-top:0">Create new group</div>
    <div class="add-group-bar">
      <input type="text" class="group-inp" id="new-group-inp" placeholder="Group name e.g. Chest, Boxing, Legs…" onkeydown="if(event.key==='Enter')createGroup()">
      <button class="btn btn-accent" onclick="createGroup()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Create group
      </button>
    </div>
    ${groupCards}`;
}

function createGroup() {
  const inp = document.getElementById('new-group-inp');
  const name = inp.value.trim();
  if (!name) { toast('Enter a group name', true); return; }
  if (groups.includes(name)) { toast(`"${name}" already exists`, true); return; }
  addGroup(name);
  inp.value = '';
  renderGroups();
  renderLog(); // refresh pills
  toast(`Group "${name}" created`);
}

function confirmDeleteGroup(name) {
  if (!confirm(`Delete group "${name}"? Exercises won't be deleted, just ungrouped.`)) return;
  deleteGroup(name);
  if (logCatFilter === name) logCatFilter = 'All';
  renderGroups();
  renderLog();
  toast(`Group "${name}" deleted`);
}

function addExToGroup(groupName) {
  const sel = document.getElementById('assign-sel-' + esc(groupName));
  if (!sel || !sel.value) { toast('Pick an exercise first', true); return; }
  const exName = sel.value;
  assignExToGroup(exName, groupName);
  // make sure exercise is in exList
  if (!exList.includes(exName)) { exList.unshift(exName); persist(); }
  renderGroups();
  renderLog();
  toast(`"${exName}" → ${groupName}`);
}

function removeExFromGroup(exName) {
  assignExToGroup(exName, '');
  renderGroups();
  renderLog();
  toast(`"${exName}" removed from group`);
}

function switchTab(t) {
  ['log','history','stats','progress','groups'].forEach(id => {
    const tb = document.getElementById('tab-'+id);
    const pn = document.getElementById('pane-'+id);
    if (tb) tb.classList.toggle('on', id===t);
    if (pn) pn.classList.toggle('on', id===t);
  });
  if (t==='history')  renderHistory();
  if (t==='stats')    renderStats();
  if (t==='progress') renderProgress();
  if (t==='groups')   renderGroups();
}

let toastTimer;
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

restore();
document.getElementById('workout-date').value = today();
renderLog();

(async () => {
  if (FS_SUPPORTED) {
    _saveHandle = await _loadHandle();
    updateSaveBtn();

})();
